spring.application.name=uniops-ticketing-service

# MongoDB Connection
spring.mongodb.uri=${MONGODB_URI:mongodb+srv://uniops_db_user:uniops@cluster0.znyobu6.mongodb.net/uniops_db?retryWrites=true&w=majority&appName=Cluster0}
spring.data.mongodb.auto-index-creation=true

server.port=8089

# File Upload Configuration
file.upload-dir=uploads/tickets
spring.servlet.multipart.location=uploads/tickets
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# JWT Configuration
#noinspection UnknownProperty
app.jwt.secret=uniops-super-secret-key-change-this-in-production-2026
#noinspection UnknownProperty
app.jwt.expiration-ms=86400000

# Google OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
