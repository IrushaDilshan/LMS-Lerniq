name: Build & Test

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  backend:
    name: Backend (Spring Boot) Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: chmod Maven Wrapper
        run: chmod +x mvnw
          
      - name: Run Maven Tests
        run: ./mvnw test

  frontend:
    name: Frontend (React) Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
          
      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci
        
      - name: Build Application
        working-directory: ./frontend
        run: npm run build
